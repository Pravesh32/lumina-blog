<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="container header-content">
            <h1 class="logo">✍️ Lumina</h1>
            <div class="header-actions">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="Search posts or authors...">
                </div>
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">🌙</button>
                <button id="auth-btn" class="btn btn-primary">Sign In</button>
                <div id="user-menu" class="user-menu hidden">
                    <div class="avatar" id="user-avatar"></div>
                    <span id="user-username" class="username"></span>
                    <button id="logout-btn" class="btn btn-ghost">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="create-post-section" class="card hidden">
            <h2>✨ Create Post</h2>
            <form id="post-form">
                <input type="text" id="post-title" placeholder="Catchy title..." required>
                <textarea id="post-content" placeholder="Share your thoughts..." required></textarea>
                <button type="submit" class="btn btn-accent">Publish</button>
            </form>
        </section>

        <section id="posts-feed">
            <div class="feed-header">
                <h2>Latest Posts</h2>
                <span id="post-count" class="badge">0</span>
            </div>
            <div id="posts-list" class="posts-grid"></div>
            <p id="empty-state" class="empty hidden">No posts yet. Start writing!</p>
        </section>
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>
            <form id="login-form" class="auth-form">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            <form id="register-form" class="auth-form hidden">
                <input type="text" id="reg-username" placeholder="Choose username" required minlength="3">
                <input type="password" id="reg-password" placeholder="Password" required minlength="4">
                <button type="submit" class="btn btn-accent">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <h2>📝 Edit Post</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <input type="text" id="edit-title" required>
                <textarea id="edit-content" required></textarea>
                <button type="submit" class="btn btn-accent">Save Changes</button>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
